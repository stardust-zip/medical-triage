services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triageos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Run ./setup.sh or create .env.}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d triageos"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: .
    command: ["python", "scripts/migrate.py"]
    environment:
      ADMIN_DATABASE_URL: ${COMPOSE_ADMIN_DATABASE_URL:?COMPOSE_ADMIN_DATABASE_URL is required. Run ./setup.sh or create .env.}
      APP_DB_USER: ${APP_DB_USER:-triageos_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required. Run ./setup.sh or create .env.}
    depends_on:
      db:
        condition: service_healthy

  # triage-service (Phase 5): AI pipeline. Owns triage_logs/red_flags. No published port.
  triage:
    build: ./services/triage
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?COMPOSE_DATABASE_URL is required. Run ./setup.sh or create .env.}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:?GATEWAY_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?INTERNAL_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      QUEUE_SERVICE_URL: "http://queue:8083"
      SCHEDULING_SERVICE_URL: "http://scheduling:8084"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-missing-openai-key}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    depends_on:
      migrate:
        condition: service_completed_successfully
      queue:
        condition: service_started
      scheduling:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10

  identity:
    build: ./services/identity
    expose:
      - "8082"
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?COMPOSE_DATABASE_URL is required. Run ./setup.sh or create .env.}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?INTERNAL_SHARED_SECRET is required. Run ./setup.sh or create .env.}
    depends_on:
      migrate:
        condition: service_completed_successfully

  # queue-service owns human_triage_queue (see services/queue). No published port.
  queue:
    build: ./services/queue
    expose:
      - "8083"
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?COMPOSE_DATABASE_URL is required. Run ./setup.sh or create .env.}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?INTERNAL_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:?GATEWAY_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      TRIAGE_SERVICE_URL: "http://triage:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # scheduling-service owns departments/doctors/clinics/appointments (see services/scheduling).
  scheduling:
    build: ./services/scheduling
    expose:
      - "8084"
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?COMPOSE_DATABASE_URL is required. Run ./setup.sh or create .env.}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?INTERNAL_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:?GATEWAY_SHARED_SECRET is required. Run ./setup.sh or create .env.}
    depends_on:
      migrate:
        condition: service_completed_successfully

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8080"
    environment:
      PORT: "8080"
      BACKEND_URL: "http://triage:8000"
      IDENTITY_URL: "http://identity:8082"
      QUEUE_SERVICE_URL: "http://queue:8083"
      SCHEDULING_SERVICE_URL: "http://scheduling:8084"
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:?GATEWAY_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?INTERNAL_SHARED_SECRET is required. Run ./setup.sh or create .env.}
      STAFF_SESSION_SECRET: ${STAFF_SESSION_SECRET:?STAFF_SESSION_SECRET is required. Run ./setup.sh or create .env.}
      PATIENT_SESSION_SECRET: ${PATIENT_SESSION_SECRET:?PATIENT_SESSION_SECRET is required. Run ./setup.sh or create .env.}
    depends_on:
      triage:
        condition: service_healthy
      identity:
        condition: service_started
      queue:
        condition: service_started
      scheduling:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_ORG_SLUG: evergreen-demo
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres-data:
