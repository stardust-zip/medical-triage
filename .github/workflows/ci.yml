name: AI Agent CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Check Syntax (Dry Run)
      run: |
        python -m compileall src/

    - name: Test Docker Build
      run: |
        docker build -t test-build .


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install ruff basedpyright # Install the linters

    - name: Lint with Ruff (Catches undefined variables)
      run: |
        ruff check src/
